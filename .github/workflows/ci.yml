name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# No untrusted input is interpolated into run: blocks anywhere in this workflow.
# All `run` lines are static commands operating on checked-out source.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
